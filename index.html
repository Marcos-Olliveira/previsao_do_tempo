<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>

    <!--BLOCO DA CAIXA DE PESQUISA CENTRAL
    ======================================
    ===================================-->
    <div class="centered-search-wrapper">
        <input type="text" class="search-box">
        <button type="button" onclick="buscarClima()" class="search-button"></button>
    </div>



    <!--BLOCO DO INDEX PRINCIPAL QUE FICARÁ OCULTO ANTES DA PESQUISA
    ================================================================
    =============================================================-->   
    <header class="hidden" hidden>
        <!--bloco do logo do site
            ======================-->
        <div class="header-logo">
            
        </div>

        <!--bloco da caixa de pesquisa
            ===========================-->
        <div class="header-search">
            <p>pesquisar cidade</p>
            <input type="text" class="header-search-box" id="city" onkeydown="if(event.key==='Enter') buscarClima()">
        </div>
    </header>

    <main class="hidden" hidden>
        <!--container que contem a tabela da previsão que será apresentada
            ===============================================================-->
        <div class="main-container">
            <div class="box-A">
                <p class="box-A-p">PREVISAO TO TEMPO PARA</p>
                <div class="box-A-nome-da-cidade">SÃO PAULO</div>
            </div>

            <div class="box-B">
                <!--aqui serão 7 blocos lado a lado, 1 para cada dia da semana-->
                <div class="tabela">
                    <p class="dia">Segunda</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">
                        <p class="temp-max">25°</p>
                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                        
                    </div>                    
                </div>

                <div class="tabela">
                    <p class="dia">Terça</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">
                        <p class="temp-max">25°</p>
                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                        
                    </div>                     
                </div>

                <div class="tabela">
                    <p class="dia">Quarta</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">

                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                        
                    </div>                     
                </div>

                <div class="tabela">
                    <p class="dia">Quinta</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">
                        <p class="temp-max">25°</p>
                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                        
                    </div>                       
                </div>

                <div class="tabela">
                    <p class="dia">Sexta</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">
                        <p class="temp-max">25°</p>
                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                       
                    </div>                       
                </div>

                <div class="tabela">
                    <p class="dia">Sábado</p>

                    </div>                     
                </div>

                    <p class="dia">Domingo</p>
                    <p class="graus"></p> 
                    <img src="img/icn-ensolarado.png" alt="icone tempo">
                    <div class="temp-max-min">
                        <p class="temp-max">25°</p>
                        <p class="seta-max">&uarr;</p>
                        <p class="temp-min">14º</p>
                        <p class="seta-min">&darr;</p>                     
                    </div>                       
                </div>
            </div>
        </div>
    </main>
    <footer class="hidden" hidden>
        <footer-links>
            <a href="#" class="footer-link"></a>
            <a href="#" class="footer-link"></a>
            <a href="#" class="footer-link"></a>
