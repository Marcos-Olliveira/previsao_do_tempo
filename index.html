<!--
    ALTERAÇÕES FEITAS PELO CLAUDE NESTE ARQUIVO:
    => 1. Havia uma tag </main> fechando sem nenhuma <main> aberta antes,
         e uma </div> extra sem abertura correspondente. Tags soltas
         deixam o HTML inválido (o navegador tenta "adivinhar" a
         estrutura, o que pode causar bugs de layout difíceis de rastrear).
         Removi as duas tags soltas.
    => 2. Removi os comentários com as 7 <div class="resul"> antigas —
         elas não são mais necessárias, porque agora os 7 cards são
         criados dinamicamente pelo JS (createElement/appendChild)
         dentro de #resul a cada busca.
    => 3. Não criei nenhuma estrutura de card fixa aqui no HTML de propósito:
         ela é 100% gerada pelo script.js. Classes que os cards recebem,
         pra você estilizar no CSS: .card / .card-dia-semana / .card-data /
         .card-clima / .card-temp-max / .card-temp-min / .card-precipitacao
-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Previsão do tempo</title>
</head>
<body>



    <!--Cabeçalho da página-->
    <header>
        <!-- adicionado o atribudo "area-live"  para os leitores de tela entenderem que é um titulo dinâmico-->
        <h1 id="titulo_principal" aria-live="polite">
            <span>Estado</span> <!--recebe a cidade oferecida pelo sistema operacional do usuario-->
            <span>País</span>
        </h1>

        <div class="header_campo_de_busca">
            <label for="buscar_cidade" class="sr-only"></label> 
            <input type="text" id="buscar_cidade" placeholder="Buscar cidade...">
            <button id="botao" onclick="buscar()">buscar</button>
        </div>

        <div class="data_atual">
            <p id="dia_da_semana">seg</p>
            <p id="dia_do_mes">03 de JUL</p>
            <p id="hora_atual">00:00</p>
        </div>
    </header>

    <main>
        <section id="informacao_de_hoje">

            <section id="agora">
                <p id="agora_p"></p>
                <div id="temperatura"></div>    
                <div id="condicao"></div>
                <div id="tem_max_min">
                    <div id="temp_min"></div>
                    <div id="temp_max"></div>
                </div>
                <div id="umidade"></div>
                <div id="vento"></div>
            </section>

            <section id="sensasao">
                <div id="sensasao_p"></div>   
                <div id="sensasao_termica"></div>
            </section>

            <section id="indice_uv">
                <div id="indice_uv_p"></div>
                <div id="indice_num"></div>
            </section>

            <section id="periodo_de_luz">

                <p>NASCER / PÕR</p>

                <div id="nascer_e_por">

                    <div id="nascer">
                        <span id="hora_do_nascer"></span>
                        <p>Nasce</p>
                    </div>

                    <div id="por">
                        <span id="hora_do_por"></span>
                        <p>Pôe</p>
                    </div>

                </div>

            </section> 

            <img src="" alt="estado do tempo" id="icone_grande">

        </section>



        <section id="proximos_dias"></section>












</main>


        

        


    <script src="script.js"></script>
</body>
</html>
