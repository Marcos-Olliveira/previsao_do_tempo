    <!--BLOCO DA CAIXA DE PESQUISA CENTRAL
    ======================================
    ===================================-->
    <div id="busca">
        <input type="text" id="busca-search-box">
        <button type="button" id="busca-search-button">Buscar</button>
    </div>





















    <!--BLOCO PRINCIPAL QUE FICARÁ OCULTO ANTES DA PESQUISA
    ================================================================
    =============================================================--> 
    <div id="resultado">  
        <header id="header">
            <!--bloco do logo do site
                ======================-->
            <div class="header-logo">
                
            </div>

                ===========================-->
            <div class="header-search">
                <p>pesquisar cidade</p>

                        <img src="img/icn-ensolarado.png" alt="icone tempo">
