<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Previsão do tempo</title>

<body>
    <div id="busca">
        <header id="header-busca">
            <div class="header-logo"></div>
        </header>

        <section id="bloco-central">
            <input type="text" id="busca-search-box" placeholder="Digite aqui a cidade que deseja pesquisar">
            <button type="button" id="busca-search-button">Buscar</button>
        </section>
    </div>

    <!--BLOCO PRINCIPAL QUE FICARÁ OCULTO ANTES DA PESQUISA
    ================================================================
    =============================================================-->
    <div id="resultado">
        <header id="header-resultado">
            <!--bloco do logo do site
                ======================-->
            <div class="header-logo">

            </div>

            <!--bloco da caixa de pesquisa
                ===========================-->
            <div class="header-search">
                <p>pesquisar cidade</p>
                <input type="text" class="header-search-box">
            </div>
        </header>

        <main class="main">


            <h1>Previsão do tempo para os próximos 7 dias em <span id="cidade-nome"></span></h1>

            <!--container que contem a tabela da previsão que será apresentada
                ===============================================================-->
            <div id="main-container">

                <div class="box-B">
                    <!--aqui serão 7 blocos lado a lado, 1 para cada dia da semana-->
                    <div class="tabela">
                        <p class="dia-mes" id="dia-mes-segunda"></p>
                        <p class="dia-semana" id="dia-semana-segunda">segunda</p>
                        <p class="descricao" id="descricao-segunda"></p>
                        <img src="img/icn-chuvoso.png" alt="Ícone do clima" class="icone-clima" id="icone-segunda">
                        <div class="temperatura" id="temperatura-segunda"></div> 
                        <div class="temp-max-min">
                            <p class="temp-max" id="temp-max-segunda"></p>
                            <p class="seta-max">&uarr;</p>
                            <p class="temp-min" id="temp-min-segunda"></p>
                            <p class="seta-min">&darr;</p>
                        </div>
                        <div class="umidade" id="umidade-segunda"></div>
                        <div class="velocidade-vento" id="velocidade-vento-segunda"></div>
                    </div>
